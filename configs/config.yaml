project:
  name: energy_profiling_thesis
  version: "1.0"
  python_version: "3.11"

paths:
  data_raw: data/raw
  data_processed: data/processed
  coordinates: data/coordinates
  rasters_root: rasters/
  outputs_csv: outputs/csv
  outputs_captions: outputs/captions
  outputs_maps: outputs/maps
  tiles: tiles/
  logs: logs/

sampling:
  total_coordinates: 5000
  min_spacing_km: 1.0
  bbox_size_m: 256
  strata:
    dense_urban: 750
    industrial: 750
    suburban: 750
    agricultural: 500
    forest: 500
    coastal: 500
    arid: 500
    alpine: 375
    informal_settlements: 375
    water_wetland: 250

rasters:
  ghsl:
    built_surface: rasters/ghsl/built_surface/GHS_BUILT_S_E2020_GLOBE_R2023A_54009_100_V1_0.tif
    building_height: rasters/ghsl/building_height/GHS_BUILT_H_AGBH_E2018_GLOBE_R2023A_54009_100_V1_0.tif
    population: rasters/ghsl/population/GHS_POP_E2020_GLOBE_R2023A_54009_100_V1_0.tif
    degurba: rasters/ghsl/degurba/GHS_SMOD_E2020_GLOBE_R2023A_54009_1000_V2_0.tif
  global_solar_atlas:
    dni: rasters/global_solar_atlas/World_DNI_GISdata_LTAy_AvgDailyTotals_GlobalSolarAtlas-v2_GEOTIFF/DNI.tif
    ghi: rasters/global_solar_atlas/World_GHI_GISdata_LTAy_AvgDailyTotals_GlobalSolarAtlas-v2_GEOTIFF/GHI.tif
    pvout: rasters/global_solar_atlas/World_PVOUT_GISdata_LTAy_AvgDailyTotals_GlobalSolarAtlas-v2_GEOTIFF/PVOUT.tif
  esa_worldcover:
    s3_bucket: "s3://esa-worldcover/v200/2021/map/"
    tile_pattern: "ESA_WorldCover_10m_2021_v200_{lat_tile}{lon_tile}_Map.tif"
    local_cache: rasters/esa_worldcover/
  viirs:
    source: google_earth_engine
    nighttime_lights: NOAA/VIIRS/DNB/MONTHLY_V1/VCMSLCFG
    ndvi: MODIS/061/MOD13A1
    surface_reflectance: MODIS/061/MOD09A1
  copernicus:
    era5: rasters/copernicus/era5/

api:
  overpass_url: "https://overpass-api.de/api/interpreter"
  groq_model: "llama-3.3-70b-versatile"
  cds_url: "https://cds.climate.copernicus.eu/api"
  gee_project: "energy-thesis"

logging:
  level: INFO
  log_file: logs/pipeline.log